# SOPS configuration for secrets management
# 1. Generate age key: ssh-to-age < ~/.ssh/id_ed25519 > ~/.config/sops/age/keys.txt
# 2. Add public key below
# 3. Create secrets: sops secrets/secrets.yaml

keys:
  # Your age public key (run: ssh-to-age < ~/.ssh/id_ed25519.pub)
  - &admin_amcmahon age1xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

creation_rules:
  # System-level secrets
  - path_regex: secrets/system/.*\.yaml$
    key_groups:
      - age:
          - *admin_amcmahon

  # User-level secrets
  - path_regex: secrets/users/.*\.yaml$
    key_groups:
      - age:
          - *admin_amcmahon

  # Default for any other secrets
  - path_regex: secrets/.*\.yaml$
    key_groups:
      - age:
          - *admin_amcmahon
